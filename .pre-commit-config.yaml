repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.0
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: local
    hooks:
      - id: qmllint
        name: qmllint
        entry: qmllint
        language: system
        types: [qml]
        files: \.qml$
